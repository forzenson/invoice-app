<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Invoice Generator</title>

<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0071E3">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Invoice">
<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="ti ti-file-invoice"></i><span>Invoice</span></div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-screen="invoices"><i class="ti ti-files"></i> Invoices</a>
      <a href="#" class="nav-item" data-screen="new-invoice"><i class="ti ti-plus"></i> New invoice</a>
      <a href="#" class="nav-item" data-screen="templates"><i class="ti ti-template"></i> Templates</a>
      <a href="#" class="nav-item" data-screen="counterparties"><i class="ti ti-building"></i> Clients</a>
      <a href="#" class="nav-item" data-screen="service-items"><i class="ti ti-list"></i> Items</a>
      <a href="#" class="nav-item" data-screen="my-companies"><i class="ti ti-id-badge"></i> My company</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/docs" target="_blank" class="nav-item"><i class="ti ti-api"></i> API docs</a>
    </div>
  </aside>

  <main class="main">

    <!-- INVOICES -->
    <section id="screen-invoices" class="screen active">
      <div class="topbar">
        <h1>Invoices</h1>
        <button class="btn btn-primary" onclick="goTo('new-invoice')"><i class="ti ti-plus"></i> New invoice</button>
      </div>
      <div class="content">
        <div class="filters-row">
          <div class="filter-fg">
            <label>Client</label>
            <select id="filter-cp" onchange="renderInvoices()"><option value="">All</option></select>
          </div>
          <div class="filter-fg">
            <label>My company</label>
            <select id="filter-mc" onchange="renderInvoices()"><option value="">All</option></select>
          </div>
          <div class="filter-fg">
            <label>Date from</label>
            <input type="date" id="filter-date-from" onchange="renderInvoices()">
          </div>
          <div class="filter-fg">
            <label>Date to</label>
            <input type="date" id="filter-date-to" onchange="renderInvoices()">
          </div>
        </div>
        <div class="table-header">
          <input class="search-input" type="text" placeholder="Search…" id="search-input" oninput="renderInvoices()">

        </div>
        <table class="data-table">
          <thead><tr>
      <th><button class="sort-btn" data-sort="number" onclick="sortInvoices('number')">Number <i class="ti ti-arrows-sort"></i></button></th>
      <th><button class="sort-btn" data-sort="counterparty_name" onclick="sortInvoices('counterparty_name')">Client <i class="ti ti-arrows-sort"></i></button></th>
      <th><button class="sort-btn" data-sort="my_company_name" onclick="sortInvoices('my_company_name')">My company <i class="ti ti-arrows-sort"></i></button></th>
      <th><button class="sort-btn sort-desc" data-sort="date" onclick="sortInvoices('date')">Date <i class="ti ti-arrows-sort"></i></button></th>
      <th class="right"><button class="sort-btn" data-sort="total_amount" onclick="sortInvoices('total_amount')">Amount <i class="ti ti-arrows-sort"></i></button></th>
      <th></th>
    </tr></thead>
          <tbody id="invoices-body"><tr><td colspan="6" class="loading-cell"><span class="spinner"></span></td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- NEW INVOICE -->
    <section id="screen-new-invoice" class="screen">
      <div class="topbar">
        <h1 id="form-title">New invoice</h1>
        <div class="topbar-actions">
          <button class="btn" onclick="resetInvoiceForm()"><i class="ti ti-refresh"></i> Reset</button>
          <button class="btn btn-primary" onclick="saveInvoice()"><i class="ti ti-device-floppy"></i> Save</button>
        </div>
      </div>
      <div class="content form-content">
        <div class="form-card">
          <div class="form-card-title">Details</div>
          <div class="form-grid two-col">
            <div class="fg"><label>Invoice number</label><input type="text" id="f-number"></div>
            <div class="fg"><label>Date</label><input type="date" id="f-date"></div>
            <div class="fg"><label>Client</label><select id="f-counterparty"><option value=""></option></select></div>
            <div class="fg"><label>My company</label><select id="f-my-company"><option value=""></option></select></div>
            <div class="fg"><label>Template</label><select id="f-template"><option value=""></option></select></div>
            <div class="fg"><label>Currency</label><select id="f-currency"><option value="EUR">EUR €</option><option value="USD">USD $</option><option value="UAH">UAH ₴</option></select></div>
            <input type="hidden" id="f-due-date" value="">
          </div>
        </div>
        <div class="form-card">
          <div class="form-card-title">Total amount</div>
          <div class="total-input-row">
            <input type="number" id="f-total" class="total-input" min="0" step="0.01" placeholder="0.00" oninput="recalcPreview()">
          </div>
        </div>
        <div class="form-card">
          <div class="form-card-title">Items</div>
          <table class="items-edit-table">
            <thead><tr><th style="width:40%">Description</th><th style="width:18%">Rate/h</th><th style="width:22%">Time (~)</th><th style="width:14%">Amount (~)</th><th style="width:6%"></th></tr></thead>
            <tbody id="items-body"></tbody>
          </table>
          <div class="items-add-row">
            <button class="add-item-btn" onclick="addItemRow()"><i class="ti ti-plus"></i> Add new item</button>
            <select id="service-item-select" class="items-add-select">
              <option value="">+ Add items</option>
            </select>
          </div>
          <div class="items-totals" id="items-totals"></div>
        </div>
      </div>
    </section>

    <!-- TEMPLATES -->
    <section id="screen-templates" class="screen">
      <div class="topbar">
        <h1>Templates</h1>
        <button class="btn btn-primary" onclick="document.getElementById('tmpl-upload-input').click()"><i class="ti ti-upload"></i> Upload</button>
        <input type="file" id="tmpl-upload-input" accept=".html,.docx" style="display:none" onchange="uploadTemplate(this)">
      </div>
      <div class="content"><div class="templates-grid" id="templates-grid"><div class="loading-cell"><span class="spinner"></span></div></div></div>
    </section>

    <!-- COUNTERPARTIES -->
    <section id="screen-counterparties" class="screen">
      <div class="topbar"><h1>Clients</h1><button class="btn btn-primary" onclick="openCpModal()"><i class="ti ti-plus"></i> Add</button></div>
      <div class="content"><div class="cp-grid" id="cp-grid"><div class="loading-cell"><span class="spinner"></span></div></div></div>
    </section>

    <!-- SERVICE ITEMS -->
    <section id="screen-service-items" class="screen">
      <div class="topbar"><h1>Items library</h1><button class="btn btn-primary" onclick="openServiceModal()"><i class="ti ti-plus"></i> Add</button></div>
      <div class="content">
        <div class="table-header">
          <input class="search-input" type="text" placeholder="Search by name…" id="service-search" oninput="renderServiceItems()">
        </div>
        <table class="data-table">
          <thead><tr><th>Description</th><th>Unit</th><th class="right">Default rate</th><th>Per-company rates</th><th></th></tr></thead>
          <tbody id="service-items-body"><tr><td colspan="5" class="loading-cell"><span class="spinner"></span></td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- MY COMPANIES -->
    <section id="screen-my-companies" class="screen">
      <div class="topbar"><h1>My company</h1><button class="btn btn-primary" onclick="openMcModal()"><i class="ti ti-plus"></i> Add</button></div>
      <div class="content"><div class="cp-grid" id="mc-grid"><div class="loading-cell"><span class="spinner"></span></div></div></div>
    </section>

  </main>
</div>

<!-- COUNTERPARTY MODAL -->
<div class="modal-backdrop" id="cp-modal" style="display:none" onclick="if(event.target===this)closeCpModal()">
  <div class="modal">
    <div class="modal-header"><span id="cp-modal-title">Client</span><button class="modal-close" onclick="closeCpModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <input type="hidden" id="cp-id">
      <div class="form-grid two-col">
        <div class="fg" style="grid-column:span 2"><label>Name *</label><input type="text" id="cp-name"></div>
        <div class="fg" style="grid-column:span 2"><label>Address</label><input type="text" id="cp-address"></div>
        <div class="fg" style="grid-column:span 2"><label>Previous address</label><input type="text" id="cp-old-address"></div>
        <div class="fg"><label>Registration number</label><input type="text" id="cp-company-number"></div>
        <div class="fg"><label>EU VAT</label><input type="text" id="cp-eu-vat"></div>
        <div class="fg"><label>IBAN</label><input type="text" id="cp-iban"></div>
        <div class="fg"><label>SWIFT</label><input type="text" id="cp-swift"></div>
        <div class="fg" style="grid-column:span 2"><label>Notes</label><textarea id="cp-notes" rows="2"></textarea></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeCpModal()">Cancel</button><button class="btn btn-primary" onclick="saveCp()">Save</button></div>
  </div>
</div>

<!-- MY COMPANY MODAL -->
<div class="modal-backdrop" id="mc-modal" style="display:none" onclick="if(event.target===this)closeMcModal()">
  <div class="modal">
    <div class="modal-header"><span id="mc-modal-title">My company</span><button class="modal-close" onclick="closeMcModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <input type="hidden" id="mc-id">
      <div class="form-grid two-col">
        <div class="fg" style="grid-column:span 2"><label>Name *</label><input type="text" id="mc-name"></div>
        <div class="fg" style="grid-column:span 2"><label>Address</label><input type="text" id="mc-address"></div>
        <div class="fg"><label>Country</label><input type="text" id="mc-country"></div>
        <div class="fg"><label>Company number</label><input type="text" id="mc-company-number"></div>
        <div class="fg"><label>IBAN</label><input type="text" id="mc-iban"></div>
        <div class="fg"><label>SWIFT</label><input type="text" id="mc-swift"></div>
        <div class="fg"><label>Account Number</label><input type="text" id="mc-account-number"></div>
        <div class="fg"><label>Routing number (ACH or ABA)</label><input type="text" id="mc-routing-number"></div>
        <div class="fg" style="grid-column:span 2"><label>VAT</label><input type="text" id="mc-vat"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeMcModal()">Cancel</button><button class="btn btn-primary" onclick="saveMc()">Save</button></div>
  </div>
</div>

<!-- SERVICE ITEM MODAL -->
<div class="modal-backdrop" id="service-modal" style="display:none" onclick="if(event.target===this)closeServiceModal()">
  <div class="modal">
    <div class="modal-header"><span id="service-modal-title">Item</span><button class="modal-close" onclick="closeServiceModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <input type="hidden" id="service-id">
      <div class="form-grid two-col">
        <div class="fg" style="grid-column:span 2"><label>Description *</label><input type="text" id="service-description"></div>
        <div class="fg"><label>Unit</label><input type="text" id="service-unit" value="Hours"></div>
        <div class="fg"><label>Default rate</label><input type="number" id="service-rate" value="100"></div>
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div id="service-rates-list"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeServiceModal()">Cancel</button><button class="btn btn-primary" onclick="saveService()">Save</button></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
